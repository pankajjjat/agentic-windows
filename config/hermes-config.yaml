# ── Agentic Windows — Hermes Configuration ──
# Generated by install.ps1 — edit manually or via agent

provider: openrouter
model: nousresearch/hermes-3-sonnet

skills:
  enabled:
    - system-health
    - disk-guardian
    - process-manager
    - memory-watchdog
    - network-monitor
    - update-manager
    - dev-quickstart

memory:
  enabled: true
  cross_session: true

cron:
  enabled: true
  health_check: "every 6h"
  disk_guardian: "every 12h"

plugins:
  enabled: []
